name: Builder

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      architectures: ${{ steps.matrix.outputs.architectures }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./jellyfin-server"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}

  build:
    needs: init
    runs-on: ubuntu-latest
    name: Build ${{ matrix.arch }} jellyfin-server add-on
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./jellyfin-server"

      - name: Check if add-on should be built
        id: check
        run: |
          BUILD_ARGS=""
          if ${{ !startsWith(github.ref, 'refs/tags/v') }}; then
            BUILD_ARGS+=" --no-latest --version unstable-${GITHUB_REF_NAME//[\/]/-}"
            if ${{ github.ref != 'refs/heads/main' }}; then
              BUILD_ARGS+=" --test"
            fi
          fi
          echo "build_args=$BUILD_ARGS" >>$GITHUB_OUTPUT
          echo "image=$(echo ${{ steps.info.outputs.image }} | cut -d'/' -f3)" >>$GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        uses: home-assistant/builder/actions/build-image@2026.03.0
        with:
          architectures: ${{ matrix.arch }}
          target: /data/jellyfin-server
          image: ${{ steps.check.outputs.image }}
          docker-hub: ghcr.io/${{ github.repository_owner }}
          addon: true
          args: ${{ steps.check.outputs.build_args }}