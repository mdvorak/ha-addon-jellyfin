on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

name: release

concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Publish Release
        uses: robgonnella/releasaurus/action@v0.20.4
        with:
          command: release
          command_args: --repo ${{ github.server_url }}/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Create/Update Release PR
        uses: robgonnella/releasaurus/action@v0.20.4
        with:
          command: release-pr
          command_args: --repo ${{ github.server_url }}/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Append Jellyfin release notes to PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head releasaurus-release-main \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -z "$PR_NUMBER" ]]; then
            echo "No open releasaurus release PR found, skipping"
            exit 0
          fi

          echo "Found release PR #${PR_NUMBER}"

          # Current Jellyfin version in Dockerfile
          CURRENT=$(grep -m1 '^FROM jellyfin/jellyfin:' jellyfin-server/Dockerfile | cut -d: -f2)

          # Version at the last release tag
          LAST_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)
          if [[ -n "$LAST_TAG" ]]; then
            PREVIOUS=$(git show "${LAST_TAG}:jellyfin-server/Dockerfile" 2>/dev/null \
              | grep -m1 '^FROM jellyfin/jellyfin:' | cut -d: -f2 || echo "")
          else
            PREVIOUS=""
          fi

          if [[ "$CURRENT" == "$PREVIOUS" ]] || [[ -z "$CURRENT" ]]; then
            echo "Jellyfin version unchanged ($CURRENT), skipping"
            exit 0
          fi

          echo "Jellyfin version changed: ${PREVIOUS:-none} -> $CURRENT"

          # All Jellyfin versions sorted ascending
          ALL_VERSIONS=$(gh api repos/jellyfin/jellyfin/releases --paginate \
            --jq '.[].tag_name | ltrimstr("v")' | sort -V)

          # Collect versions in range (PREVIOUS exclusive, CURRENT inclusive)
          VERSIONS_IN_RANGE=$(echo "$ALL_VERSIONS" | awk \
            -v prev="$PREVIOUS" -v curr="$CURRENT" \
            'BEGIN{found=(prev=="")} $0==prev{found=1; next} found{print; if($0==curr) exit}')

          if [[ -z "$VERSIONS_IN_RANGE" ]]; then
            echo "No versions found in range, skipping"
            exit 0
          fi

          # Fetch and concatenate release notes for each version in range (newest first)
          NOTES_COMBINED=""
          while IFS= read -r version; do
            [[ -z "$version" ]] && continue
            # Fetch the GitHub release; silently skip if the tag doesn't exist yet
            release=$(gh api "repos/jellyfin/jellyfin/releases/tags/v${version}" 2>/dev/null || echo "")
            [[ -z "$release" ]] && continue
            body=$(echo "$release" | jq -r '.body' | tr -d '\r')  # strip Windows line endings
            url=$(echo "$release" | jq -r '.html_url')
            [[ -z "$body" ]] && continue
            # Strip :rocket: emoji from release title
            body="$(sed 's/:rocket: //g' <<< "$body")"
            # Strip @ prefix from name references
            body="$(sed 's/@\([a-zA-Z0-9_-]*\)/\1/g' <<< "$body")"
            # Strip # from issue/PR number references (avoids invalid cross-repo links)
            body="$(sed 's/#\([0-9]\+\)/\1/g' <<< "$body")"
            # Linkify the first top-level heading (the release title) with the release URL
            shifted="$(sed "0,/^# /s|^# \(.*\)|# [\1](${url})|" <<< "$body")"
            # Demote all headings by two levels so they nest under our PR-level headings
            shifted="$(sed 's/^#/###/' <<< "$shifted")"
            NOTES_COMBINED="$(printf '%s\n\n%s' "$NOTES_COMBINED" "$shifted")"
          done <<< "$(sort -V -r <<< "$VERSIONS_IN_RANGE")"

          if [[ -z "$NOTES_COMBINED" ]]; then
            echo "No release notes found for any version in range, skipping"
            exit 0
          fi

          # Write notes to temp file to avoid shell-escaping issues
          printf '%s' "$NOTES_COMBINED" > /tmp/jellyfin_notes.md
          gh pr view "$PR_NUMBER" --json body --jq '.body' > /tmp/pr_body.txt

          # Update the persistent footer div in the releasaurus PR body
          python3 - <<'PYEOF'
import re

with open('/tmp/pr_body.txt') as f:
    body = f.read()
with open('/tmp/jellyfin_notes.md') as f:
    notes = f.read().strip()

div_id = 'jellyfin-server-footer'
new_footer = f'<div id="{div_id}">\n\n{notes}\n\n</div>'
pattern = re.compile(
    r'<div\s+id=["\']' + re.escape(div_id) + r'["\']>.*?</div>',
    re.DOTALL
)
if pattern.search(body):
    updated = pattern.sub(new_footer, body)
    print('Replaced footer div.')
else:
    updated = body.rstrip() + '\n\n' + new_footer + '\n'
    print('Appended footer div.')

with open('/tmp/pr_body_new.txt', 'w') as f:
    f.write(updated)
PYEOF

          gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body_new.txt
