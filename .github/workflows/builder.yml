name: Builder

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  ARCHITECTURES: '["amd64", "aarch64"]'

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      push: ${{ steps.meta.outputs.push }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Determine version and tags
        id: meta
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="${GH_REF_NAME#v}"
            {
              echo "version=$VERSION"
              echo "push=true"
              echo "tags<<EOF"
              echo "$VERSION"
              echo "latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$GH_REF" == refs/heads/main ]]; then
            {
              echo "version=unstable-main"
              echo "push=true"
              echo "tags=unstable-main"
            } >> "$GITHUB_OUTPUT"
          else
            REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
            VERSION="unstable-${REF//[\/]/-}"
            {
              echo "version=$VERSION"
              echo "push=false"
              echo "tags=$VERSION"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: jellyfin-server

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build jellyfin-server add-on
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: ${{ needs.init.outputs.tags }}
          version: ${{ needs.init.outputs.version }}
          push: ${{ needs.init.outputs.push }}
          file: jellyfin-server/Dockerfile
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    if: needs.init.outputs.push == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: jellyfin-server
          image-tags: ${{ needs.init.outputs.tags }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backward-compat aliases
        env:
          TAGS: ${{ needs.init.outputs.tags }}
          OWNER: ${{ github.repository_owner }}
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            for arch in amd64 aarch64; do
              docker buildx imagetools create \
                --tag "ghcr.io/${OWNER}/jellyfin-server-${arch}:${tag}" \
                "ghcr.io/${OWNER}/${arch}-jellyfin-server:${tag}"
            done
          done <<< "$TAGS"
