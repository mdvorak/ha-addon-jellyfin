name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint add-on ${{ matrix.path }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - jellyfin-server
          - jellyfin-server-hn
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6

      - name: Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2.21
        with:
          path: "./${{ matrix.path }}"
